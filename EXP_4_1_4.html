<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXP_4_1_4</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body {
  background: #1e1e1e;
  color: white;
  font-family: monospace;
  padding: 20px;
  margin: 0;
}
h3 {
  margin-top: 0;
  margin-bottom: 14px;
}
.editor {
  display: flex;
  border: 1px solid #444;
  border-radius: 6px;
  overflow: hidden;
}
#lineNumbers {
  background: #111;
  color: #00ff00;
  padding: 10px;
  text-align: right;
  white-space: pre;
  user-select: none;
  min-width: 48px;
  overflow: hidden;
}
#code {
  flex: 1;
  background: #111;
  color: white;
  border: none;
  padding: 10px;
  resize: vertical;
  overflow: auto;
  white-space: pre;
  min-height: 420px;
  font-family: monospace;
  font-size: 14px;
  line-height: 1.4;
  outline: none;
}
.controls {
  margin-top: 10px;
  margin-bottom: 10px;
}
button {
  margin-top: 10px;
  margin-right: 10px;
  padding: 8px 14px;
  background: #007acc;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-family: monospace;
}
button:hover {
  filter: brightness(1.08);
}
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
#status {
  margin-top: 8px;
  color: #cfcfcf;
  min-height: 1.2em;
}
#stdoutBox {
  margin-top: 15px;
  background: #111;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 10px;
  display: none;
}
#stdoutBox h4 {
  margin: 0 0 8px 0;
  color: #ddd;
}
#stdout {
  white-space: pre-wrap;
  word-break: break-word;
  color: #f0f0f0;
  margin: 0;
}
#plotBox {
  margin-top: 15px;
  background: white;
  padding: 10px;
  display: none;
  border-radius: 6px;
}
#plotBox img {
  max-width: 100%;
  height: auto;
  display: block;
}
</style>
</head>

<body>

<h3>EXP_4_1_4</h3>

<div class="editor">
  <pre id="lineNumbers"></pre>
  <textarea id="code" spellcheck="false"></textarea>
</div>

<div class="controls">
  <button id="runBtn">Run Code</button>
  <button id="savePngBtn">Save PNG</button>
  <button id="savePdfBtn">Save PDF</button>
</div>

<div id="status"></div>

<div id="stdoutBox">
  <h4>Output</h4>
  <pre id="stdout"></pre>
</div>

<div id="plotBox">
  <img id="plot" alt="Generated plot">
</div>

<script>
const code = document.getElementById("code");
const lines = document.getElementById("lineNumbers");
const plot = document.getElementById("plot");
const plotBox = document.getElementById("plotBox");
const stdoutBox = document.getElementById("stdoutBox");
const stdoutEl = document.getElementById("stdout");
const statusEl = document.getElementById("status");
const runBtn = document.getElementById("runBtn");
const savePngBtn = document.getElementById("savePngBtn");
const savePdfBtn = document.getElementById("savePdfBtn");

const baseName = "EXP_4_1_4";
let pyodideReadyPromise = null;

code.value = `import numpy as np
import matplotlib.pyplot as plt

# Constants
q = 1.0
m = 0.1
initial_speed = 15.0

dt = 0.001
T_total = 10.0
time_steps = int(T_total / dt)

time_exp = 1.3

# Initial state: [x, y, vx, vy]
state = np.array([0.0, 0.0, initial_speed, 0.0], dtype=float)

x_positions = []
y_positions = []

def derivatives(state, time):
    x, y, vx, vy = state
    
    B = 0.05 * time**time_exp
    
    ax = (q / m) * (vy * B)
    ay = -(q / m) * (vx * B)
    
    return np.array([vx, vy, ax, ay], dtype=float)

# RK4 loop
for t in range(time_steps):
    time = t * dt

    k1 = derivatives(state, time)
    k2 = derivatives(state + 0.5 * dt * k1, time + 0.5 * dt)
    k3 = derivatives(state + 0.5 * dt * k2, time + 0.5 * dt)
    k4 = derivatives(state + dt * k3, time + dt)

    state += (dt / 6.0) * (k1 + 2*k2 + 2*k3 + k4)

    x_positions.append(state[0])
    y_positions.append(state[1])

# Plot trajectory
plt.figure(figsize=(8, 8))
plt.plot(x_positions, y_positions)

plt.title("Trajectory in Time-Varying Magnetic Field (RK4)")
plt.xlabel("X Position (m)")
plt.ylabel("Y Position (m)")

plt.grid(True)
plt.axis('equal')
plt.show()`;

function updateLines() {
  const n = code.value.split("\n").length;
  let s = "";
  for (let i = 1; i <= n; i++) s += i + "\n";
  lines.textContent = s;
}

updateLines();
code.addEventListener("input", updateLines);
code.addEventListener("scroll", () => {
  lines.scrollTop = code.scrollTop;
});

async function ensurePyodide() {
  if (!pyodideReadyPromise) {
    pyodideReadyPromise = (async () => {
      const pyodide = await loadPyodide();
      await pyodide.loadPackage(["numpy", "matplotlib", "sympy"]);
      return pyodide;
    })();
  }
  return pyodideReadyPromise;
}

function setStatus(msg) {
  statusEl.textContent = msg;
}

function resetOutput() {
  stdoutEl.textContent = "";
  stdoutBox.style.display = "none";
  plot.src = "";
  plotBox.style.display = "none";
}

async function runCode() {
  runBtn.disabled = true;
  setStatus("Running...");
  resetOutput();

  try {
    const pyodide = await ensurePyodide();

    await pyodide.runPythonAsync(`
import sys
import io
import base64
from io import BytesIO
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
plt.close('all')
sys.stdout = io.StringIO()
sys.stderr = sys.stdout
`);

    const wrappedCode = `
try:
` + code.value.split("\n").map(line => "    " + line).join("\n") + `

    import matplotlib.pyplot as plt
    figs = plt.get_fignums()
    __stdout__ = sys.stdout.getvalue()

    if figs:
        __plot_buf__ = BytesIO()
        plt.savefig(__plot_buf__, format="png", bbox_inches="tight")
        __plot_buf__.seek(0)
        __plot_base64__ = base64.b64encode(__plot_buf__.read()).decode("utf-8")
        plt.savefig("plot.png", format="png", bbox_inches="tight")
        plt.savefig("plot.pdf", format="pdf", bbox_inches="tight")
    else:
        __plot_base64__ = None
except Exception as e:
    __stdout__ = sys.stdout.getvalue()
    if __stdout__ and not __stdout__.endswith("\\n"):
        __stdout__ += "\\n"
    __stdout__ += f"{type(e).__name__}: {e}"
    __plot_base64__ = None
`;

    await pyodide.runPythonAsync(wrappedCode);

    const stdoutText = await pyodide.runPythonAsync("__stdout__");
    const plotBase64 = await pyodide.runPythonAsync("__plot_base64__");

    if (stdoutText && stdoutText.trim() !== "") {
      stdoutEl.textContent = stdoutText;
      stdoutBox.style.display = "block";
    }

    if (plotBase64) {
      plot.src = "data:image/png;base64," + plotBase64;
      plotBox.style.display = "block";
      setStatus("Done.");
    } else {
      setStatus("Done. No plot was generated.");
    }
  } catch (err) {
    stdoutEl.textContent = String(err);
    stdoutBox.style.display = "block";
    setStatus("Execution failed.");
  } finally {
    runBtn.disabled = false;
  }
}

function downloadBlob(data, mimeType, filename) {
  const blob = new Blob([data], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function savePNG() {
  try {
    const pyodide = await ensurePyodide();
    const file = pyodide.FS.readFile("plot.png");
    downloadBlob(file, "image/png", baseName + ".png");
  } catch (err) {
    alert("No PNG file available yet. Run the code first.");
  }
}

async function savePDF() {
  try {
    const pyodide = await ensurePyodide();
    const file = pyodide.FS.readFile("plot.pdf");
    downloadBlob(file, "application/pdf", baseName + ".pdf");
  } catch (err) {
    alert("No PDF file available yet. Run the code first.");
  }
}

runBtn.addEventListener("click", runCode);
savePngBtn.addEventListener("click", savePNG);
savePdfBtn.addEventListener("click", savePDF);
</script>
</body>
</html>
