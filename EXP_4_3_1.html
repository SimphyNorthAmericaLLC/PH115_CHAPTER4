<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXP_4_3_1_WIDGET_FIXED</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
<style>
body{background:#1e1e1e;color:white;font-family:monospace;padding:20px;}
.editor{display:flex;border:1px solid #444;}
#lineNumbers{background:#111;color:#00ff00;padding:10px;text-align:right;white-space:pre;user-select:none;}
#code{flex:1;background:#111;color:white;border:none;padding:10px;resize:none;overflow:auto;white-space:pre;line-height:1.35;}
button{margin-top:10px;margin-right:10px;padding:8px 14px;background:#007acc;color:white;border:none;cursor:pointer;}
#plot{margin-top:20px;background:white;padding:10px;display:none;}
#plot img{max-width:100%;}
#output{background:#000;color:#0f0;padding:10px;margin-top:10px;white-space:pre-wrap;border:1px solid #333;}
</style>
</head>
<body>

<h3>EXP_4_3_1 — Magnetic Field Lines with Iron or Copper Ring</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code"></textarea>
</div>

<button onclick="run()">Run Code</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="output"></div>
<div id="plot"><img id="plotImg"></div>

<script>
const code=document.getElementById("code");
const lines=document.getElementById("lineNumbers");
const output=document.getElementById("output");
const plotDiv=document.getElementById("plot");
const plotImg=document.getElementById("plotImg");

code.value=`import numpy as np
import matplotlib.pyplot as plt

# ==== USER SELECTION ====
material = input("Select material (iron/copper): ").strip().lower()
if material not in ['iron', 'copper']:
    print("Invalid selection. Defaulting to 'iron'.")
    material = 'iron'

# ==== SETUP ====
# Grid setup
x = np.linspace(-3, 3, 100)
y = np.linspace(-2, 2, 80)
X, Y = np.meshgrid(x, y)
Z = np.zeros_like(X)

# Magnetic pole positions
north = np.array([-2, 0])
south = np.array([2, 0])

# Iron/copper ring
ring_center = np.array([0, 0])
ring_radius = 0.8
ring_thickness = 0.2

# Field calculation
Bx = np.zeros_like(X)
By = np.zeros_like(Y)

for i in range(X.shape[0]):
    for j in range(X.shape[1]):
        pos = np.array([X[i,j], Y[i,j]])

        # Dipole-like field from north/south poles
        r_n = pos - north
        r_s = pos - south
        B = np.zeros(2)

        if np.linalg.norm(r_n) > 0.2:
            B -= r_n / np.linalg.norm(r_n)**3
        if np.linalg.norm(r_s) > 0.2:
            B += r_s / np.linalg.norm(r_s)**3

        # Distort field near the ring if material is iron
        if material == 'iron':
            r_rel = pos - ring_center
            r_mag = np.linalg.norm(r_rel)
            if abs(r_mag - ring_radius) < ring_thickness:
                tangent = np.array([-r_rel[1], r_rel[0]])
                tangent = tangent / np.linalg.norm(tangent)
                B = tangent * np.linalg.norm(B) * 2  # exaggerate for effect

        Bx[i,j] = B[0]
        By[i,j] = B[1]

# ==== PLOTTING ====
fig, ax = plt.subplots(figsize=(10, 6))
ax.streamplot(X, Y, Bx, By, color='cyan', linewidth=1.2, density=1.5, arrowsize=1.2)

# Draw poles
ax.plot(*north, 'bo', markersize=10, label='North')
ax.plot(*south, 'ro', markersize=10, label='South')

# Draw ring (iron or copper)
ring_color = 'gray' if material == 'iron' else 'orange'
ring_label = 'Iron (μ >> μ₀)' if material == 'iron' else 'Copper (μ ≈ μ₀)'
ring_patch = plt.Circle(ring_center, ring_radius, color=ring_color, fill=False, linewidth=3)
ax.add_patch(ring_patch)

ax.set_aspect('equal')
ax.set_xlim(-3, 3)
ax.set_ylim(-2, 2)
ax.set_title(f"Magnetic Field Lines with {ring_label} Ring")
ax.set_xlabel("x (arbitrary units)")
ax.set_ylabel("y (arbitrary units)")
ax.legend()
plt.grid(True)
plt.tight_layout()
plt.show()
`;

function updateLines(){
  let n=code.value.split("\n").length;
  let s="";
  for(let i=1;i<=n;i++) s+=i+"\n";
  lines.textContent=s;
}
updateLines();
code.addEventListener("input",updateLines);
code.addEventListener("scroll",()=>lines.scrollTop=code.scrollTop);

let pyodideReady=loadPyodide();

async function run(){
  output.textContent="Running...";
  plotDiv.style.display="none";

  let pyodide=await pyodideReady;
  await pyodide.loadPackage(["numpy","matplotlib"]);

  await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
plt.close('all')
`);

  const userMaterial = prompt("Select material (iron/copper):","iron") || "iron";
  pyodide.globals.set("browser_material", userMaterial);

  const patchedCode = code.value.replace(
    'material = input("Select material (iron/copper): ").strip().lower()',
    'material = browser_material.strip().lower()'
  );

  let stdout="";
  pyodide.setStdout({batched:(s)=>stdout+=s});

  await pyodide.runPythonAsync(patchedCode);

  output.textContent = stdout || "Execution complete.";

  const png = await pyodide.runPythonAsync(`
from io import BytesIO
import base64
buf = BytesIO()
plt.savefig(buf, format="png", dpi=150, bbox_inches="tight")
buf.seek(0)
base64.b64encode(buf.read()).decode()
  `);

  plotImg.src = "data:image/png;base64," + png;
  plotDiv.style.display="block";

  await pyodide.runPythonAsync(`
plt.savefig("plot.png", dpi=200, bbox_inches="tight")
plt.savefig("plot.pdf", bbox_inches="tight")
  `);
}

async function savePNG(){
  let pyodide=await pyodideReady;
  let f=pyodide.FS.readFile("plot.png");
  let a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([f],{type:"image/png"}));
  a.download="plot.png";
  a.click();
}

async function savePDF(){
  let pyodide=await pyodideReady;
  let f=pyodide.FS.readFile("plot.pdf");
  let a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([f],{type:"application/pdf"}));
  a.download="plot.pdf";
  a.click();
}
</script>
</body>
</html>
