<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetic Field with Ring</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .container {
      width: 980px;
      max-width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      overflow: hidden;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      background: #0f172a;
      border-bottom: 1px solid #374151;
      flex-wrap: wrap;
    }
    label { font-weight: 600; }
    select, button {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #4b5563;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover, select:hover { border-color: #9ca3af; }
    .info {
      margin-left: auto;
      color: #cbd5e1;
      font-size: 14px;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #0b1220;
    }
    .footer {
      padding: 10px 18px 16px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.4;
    }
    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls">
      <label for="material">Material:</label>
      <select id="material">
        <option value="iron">iron</option>
        <option value="copper">copper</option>
      </select>
      <button id="redrawBtn">Update Field</button>
      <button id="saveBtn">Save PNG</button>
      <div class="info" id="titleText">Magnetic Field Lines with Iron (μ >> μ₀) Ring</div>
    </div>
    <canvas id="plot" width="980" height="620"></canvas>
    <div class="footer">
      <span><span class="legend-dot" style="background:#60a5fa"></span>North pole</span>
      &nbsp;&nbsp;
      <span><span class="legend-dot" style="background:#f87171"></span>South pole</span>
      &nbsp;&nbsp;
      <span><span class="legend-dot" style="background:#9ca3af"></span>Iron ring</span>
      &nbsp;&nbsp;
      <span><span class="legend-dot" style="background:#fb923c"></span>Copper ring</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('plot');
    const ctx = canvas.getContext('2d');
    const materialSelect = document.getElementById('material');
    const redrawBtn = document.getElementById('redrawBtn');
    const saveBtn = document.getElementById('saveBtn');
    const titleText = document.getElementById('titleText');

    const world = {
      xmin: -3, xmax: 3,
      ymin: -2, ymax: 2
    };

    const north = { x: -2, y: 0 };
    const south = { x: 2, y: 0 };
    const ringCenter = { x: 0, y: 0 };
    const ringRadius = 0.8;
    const ringThickness = 0.2;

    function toCanvas(x, y) {
      const px = (x - world.xmin) / (world.xmax - world.xmin) * canvas.width;
      const py = canvas.height - (y - world.ymin) / (world.ymax - world.ymin) * canvas.height;
      return { x: px, y: py };
    }

    function norm(vx, vy) {
      return Math.hypot(vx, vy);
    }

    function fieldAt(x, y, material) {
      let bx = 0;
      let by = 0;

      let rxn = x - north.x;
      let ryn = y - north.y;
      let rn = Math.hypot(rxn, ryn);
      if (rn > 0.2) {
        bx -= rxn / Math.pow(rn, 3);
        by -= ryn / Math.pow(rn, 3);
      }

      let rxs = x - south.x;
      let rys = y - south.y;
      let rs = Math.hypot(rxs, rys);
      if (rs > 0.2) {
        bx += rxs / Math.pow(rs, 3);
        by += rys / Math.pow(rs, 3);
      }

      if (material === 'iron') {
        const rrx = x - ringCenter.x;
        const rry = y - ringCenter.y;
        const rmag = Math.hypot(rrx, rry);
        if (Math.abs(rmag - ringRadius) < ringThickness && rmag > 1e-9) {
          let tx = -rry / rmag;
          let ty = rrx / rmag;
          const bmag = Math.hypot(bx, by);
          bx = tx * bmag * 2;
          by = ty * bmag * 2;
        }
      }

      return { bx, by };
    }

    function drawAxes() {
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 1;
      ctx.font = '14px Arial';
      ctx.fillStyle = '#cbd5e1';

      const x0 = toCanvas(world.xmin, 0);
      const x1 = toCanvas(world.xmax, 0);
      const y0 = toCanvas(0, world.ymin);
      const y1 = toCanvas(0, world.ymax);

      ctx.beginPath();
      ctx.moveTo(x0.x, x0.y);
      ctx.lineTo(x1.x, x1.y);
      ctx.moveTo(y0.x, y0.y);
      ctx.lineTo(y1.x, y1.y);
      ctx.stroke();

      for (let x = -3; x <= 3; x += 1) {
        const p = toCanvas(x, 0);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - 5);
        ctx.lineTo(p.x, p.y + 5);
        ctx.stroke();
        if (x !== 0) ctx.fillText(String(x), p.x - 4, p.y + 18);
      }

      for (let y = -2; y <= 2; y += 1) {
        const p = toCanvas(0, y);
        ctx.beginPath();
        ctx.moveTo(p.x - 5, p.y);
        ctx.lineTo(p.x + 5, p.y);
        ctx.stroke();
        if (y !== 0) ctx.fillText(String(y), p.x + 8, p.y + 4);
      }

      ctx.fillText('x (arbitrary units)', canvas.width - 160, x0.y - 10);
      ctx.save();
      ctx.translate(y1.x + 24, 120);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('y (arbitrary units)', 0, 0);
      ctx.restore();
    }

    function drawGrid() {
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      for (let x = -3; x <= 3; x += 0.5) {
        const p1 = toCanvas(x, world.ymin);
        const p2 = toCanvas(x, world.ymax);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
      for (let y = -2; y <= 2; y += 0.5) {
        const p1 = toCanvas(world.xmin, y);
        const p2 = toCanvas(world.xmax, y);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }

    function drawArrowhead(x1, y1, x2, y2, color) {
      const angle = Math.atan2(y2 - y1, x2 - x1);
      const size = 7;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - size * Math.cos(angle - Math.PI / 6), y2 - size * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - size * Math.cos(angle + Math.PI / 6), y2 - size * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function traceFieldLine(seedX, seedY, material, dirSign) {
      const pts = [];
      let x = seedX;
      let y = seedY;
      const step = 0.045 * dirSign;

      for (let k = 0; k < 900; k++) {
        if (x < world.xmin || x > world.xmax || y < world.ymin || y > world.ymax) break;
        const dN = Math.hypot(x - north.x, y - north.y);
        const dS = Math.hypot(x - south.x, y - south.y);
        if (dN < 0.16 || dS < 0.16) break;

        pts.push({ x, y });
        const { bx, by } = fieldAt(x, y, material);
        const bmag = Math.hypot(bx, by);
        if (bmag < 1e-6) break;

        x += step * bx / bmag;
        y += step * by / bmag;
      }
      return pts;
    }

    function drawFieldLines(material) {
      ctx.strokeStyle = '#22d3ee';
      ctx.lineWidth = 1.4;

      const seeds = [];

      // Dense seeding near the poles so more field lines are launched overall.
      for (let a = -1.35; a <= 1.35; a += 0.16) {
        seeds.push({ x: north.x + 0.20, y: north.y + a * 0.52 });
        seeds.push({ x: south.x - 0.20, y: south.y + a * 0.52 });
      }

      // Extra seeds above and below the magnet axis to fill the outer region.
      for (let y = -1.7; y <= 1.7; y += 0.22) {
        seeds.push({ x: -1.0, y });
        seeds.push({ x: 1.0, y });
      }

      // Strongly seed around the ring so the iron-core channeling effect is obvious.
      for (let t = 0; t < 2 * Math.PI; t += Math.PI / 16) {
        seeds.push({ x: ringCenter.x + 1.18 * Math.cos(t), y: ringCenter.y + 1.18 * Math.sin(t) });
        seeds.push({ x: ringCenter.x + 0.96 * Math.cos(t), y: ringCenter.y + 0.96 * Math.sin(t) });
        if (material === 'iron') {
          seeds.push({ x: ringCenter.x + 0.80 * Math.cos(t), y: ringCenter.y + 0.80 * Math.sin(t) });
        }
      }

      for (const s of seeds) {
        const forward = traceFieldLine(s.x, s.y, material, 1);
        const backward = traceFieldLine(s.x, s.y, material, -1);
        const pts = backward.reverse().concat(forward);
        if (pts.length < 2) continue;

        ctx.beginPath();
        const p0 = toCanvas(pts[0].x, pts[0].y);
        ctx.moveTo(p0.x, p0.y);
        for (let i = 1; i < pts.length; i++) {
          const p = toCanvas(pts[i].x, pts[i].y);
          ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();

        if (pts.length > 12) {
          const mid = Math.floor(pts.length * 0.65);
          const p1 = toCanvas(pts[mid - 1].x, pts[mid - 1].y);
          const p2 = toCanvas(pts[mid].x, pts[mid].y);
          drawArrowhead(p1.x, p1.y, p2.x, p2.y, '#22d3ee');
        }
      }
    }

    function drawPolesAndRing(material) {
      const northP = toCanvas(north.x, north.y);
      const southP = toCanvas(south.x, south.y);
      const centerP = toCanvas(ringCenter.x, ringCenter.y);
      const pxRadius = ringRadius / (world.xmax - world.xmin) * canvas.width;

      ctx.strokeStyle = material === 'iron' ? '#9ca3af' : '#fb923c';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(centerP.x, centerP.y, pxRadius, 0, 2 * Math.PI);
      ctx.stroke();

      ctx.fillStyle = '#60a5fa';
      ctx.beginPath();
      ctx.arc(northP.x, northP.y, 10, 0, 2 * Math.PI);
      ctx.fill();
      ctx.fillStyle = '#e5e7eb';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('North', northP.x - 18, northP.y - 16);

      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(southP.x, southP.y, 10, 0, 2 * Math.PI);
      ctx.fill();
      ctx.fillStyle = '#e5e7eb';
      ctx.fillText('South', southP.x - 18, southP.y - 16);
    }

    function draw() {
      const material = materialSelect.value;
      const ringLabel = material === 'iron' ? 'Iron (μ >> μ₀)' : 'Copper (μ ≈ μ₀)';
      titleText.textContent = `Magnetic Field Lines with ${ringLabel} Ring`;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawAxes();
      drawFieldLines(material);
      drawPolesAndRing(material);

      ctx.fillStyle = '#e5e7eb';
      ctx.font = 'bold 22px Arial';
      ctx.fillText(`Magnetic Field Lines with ${ringLabel} Ring`, 28, 34);
    }

    redrawBtn.addEventListener('click', draw);
    materialSelect.addEventListener('change', draw);
    saveBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'magnetic_field_ring_widget.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    draw();
  </script>
</body>
</html>
