<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXP_4_1_2_WIDGET</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{background:#1e1e1e;color:white;font-family:monospace;padding:15px;}
.editor{display:flex;border:1px solid #444;height:340px;}
#lineNumbers{background:#111;color:#00ff00;padding:10px 8px;margin:0;text-align:right;overflow:hidden;white-space:pre;}
#code{flex:1;background:#111;color:white;border:none;padding:10px;resize:none;overflow:auto;white-space:pre;}
button{margin-top:10px;margin-right:10px;padding:8px 14px;background:#007acc;color:white;border:none;cursor:pointer;}
#output{background:#111;padding:10px;margin-top:10px;min-height:80px;white-space:pre-wrap;}
#plotBox{margin-top:15px;background:white;padding:10px;display:none;}
#plotBox img{max-width:100%;margin-bottom:10px;}
</style>
</head>
<body>

<h3>Helical Motion of Charged Particle in Magnetic Field</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import numpy as np
import matplotlib.pyplot as plt

# Charge and mass
q = 1.6e-19
m = 1.67e-27

# Magnetic field (z-direction)
B = np.array([0,0,1e-3])

# Initial velocity components
v_parallel = 1e5
v_perp = 2e5

v = np.array([v_perp,0,v_parallel])
r = np.array([0.,0.,0.])

dt = 1e-8
steps = 4000

xs=[]
ys=[]
zs=[]

for i in range(steps):

    # Lorentz force F = q v x B
    F = q*np.cross(v,B)

    # Acceleration
    a = F/m

    # Update motion
    v = v + a*dt
    r = r + v*dt

    xs.append(r[0])
    ys.append(r[1])
    zs.append(r[2])

fig = plt.figure()
ax = fig.add_subplot(projection='3d')

ax.plot(xs,ys,zs)

ax.set_xlabel("x")
ax.set_ylabel("y")
ax.set_zlabel("z")

ax.set_title("Helical Motion in Magnetic Field")

plt.show()
</textarea>
</div>

<button onclick="run()">Run Code</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>



<div id="plotBox">
<img id="plot1">
</div>

<script>
const codeEl=document.getElementById("code");
const lineNumbers=document.getElementById("lineNumbers");
const plotBox=document.getElementById("plotBox");


function updateLineNumbers(){
    const lines=codeEl.value.split("\n").length;
    let nums="";
    for(let i=1;i<=lines;i++) nums+=i+"\n";
    lineNumbers.textContent=nums;
}

codeEl.addEventListener("input", updateLineNumbers);
codeEl.addEventListener("scroll", ()=> lineNumbers.scrollTop = codeEl.scrollTop);
updateLineNumbers();

let pyodideReady = loadPyodide();

async function run(){
    plotBox.style.display="none";
    
    let pyodide = await pyodideReady;
    await pyodide.loadPackage(["numpy","matplotlib"]);

    await pyodide.runPythonAsync(`
import base64
from io import BytesIO
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
plt.close('all')
`);
    await pyodide.runPythonAsync(codeEl.value);


    const figCount = await pyodide.runPythonAsync("len(plt.get_fignums())");
    if (figCount > 0) {
        let img = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.savefig(buf,format="png")
buf.seek(0)
base64.b64encode(buf.read()).decode()
`);
        document.getElementById("plot1").src="data:image/png;base64,"+img;
        plotBox.style.display="block";

        await pyodide.runPythonAsync(`
plt.savefig("plot.png")
plt.savefig("plot.pdf")
`);
    }

}


async function savePNG(){
    let pyodide = await pyodideReady;
    let f = pyodide.FS.readFile("plot.png");
    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([f],{type:"image/png"}));
    a.download="plot.png";
    a.click();
}

async function savePDF(){
    let pyodide = await pyodideReady;
    let f = pyodide.FS.readFile("plot.pdf");
    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([f],{type:"application/pdf"}));
    a.download="plot.pdf";
    a.click();
}

</script>
</body>
</html>
