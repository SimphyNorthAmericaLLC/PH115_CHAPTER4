
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXP_4_2_4_WIDGET</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{
background:#1e1e1e;
color:white;
font-family:monospace;
padding:20px;
}

.editor{
display:flex;
border:1px solid #444;
margin-bottom:10px;
}

#lineNumbers{
background:#111;
color:#00ff00;
padding:10px;
text-align:right;
white-space:pre;
user-select:none;
}

#code{
flex:1;
background:#111;
color:white;
border:none;
padding:10px;
resize:none;
overflow:auto;
white-space:pre;
}

button{
margin-top:5px;
margin-right:10px;
padding:8px 14px;
background:#007acc;
color:white;
border:none;
cursor:pointer;
}

#plot{
margin-top:20px;
background:white;
padding:10px;
}

#output{
background:#000;
color:#0f0;
padding:10px;
margin-top:10px;
white-space:pre-wrap;
border:1px solid #333;
}
</style>
</head>

<body>

<h3>Charged Particle Motion in Electric and Magnetic Fields (ODE Solver)</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code"></textarea>
</div>

<button onclick="run()">Run Code</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="output"></div>
<div id="plot"></div>

<script>

const code=document.getElementById("code")
const lines=document.getElementById("lineNumbers")
const output=document.getElementById("output")
const plotDiv=document.getElementById("plot")

code.value=`import numpy as np
import matplotlib.pyplot as plt
from scipy.integrate import solve_ivp

# Parameters
q = 5e-3  # Charge of the particle (Coulombs)
m = 6e-2  # Mass of the particle (kg)
B = 13    # Magnetic field strength (Tesla)
E = 5     # Electric field strength (V/m)

# Time parameters
t0 = 0      # Initial time (seconds)
tf = 100    # Final time (seconds)

# Initial conditions
x0 = 0      # Initial x position (m)
y0 = 0      # Initial y position (m)
u_x0 = 0    # Initial velocity in x direction (m/s)
u_y0 = 0    # Initial velocity in y direction (m/s)

initial_conditions = [x0, y0, u_x0, u_y0]

def equations_of_motion(t, y):
    dydt = np.zeros(4)
    dydt[0] = y[2]
    dydt[1] = y[3]
    dydt[2] = (q/m) * y[3] * B
    dydt[3] = (q/m) * (E - y[2] * B)
    return dydt

time_span = (t0, tf)
solution = solve_ivp(equations_of_motion, time_span, initial_conditions, dense_output=True)

t = np.linspace(t0, tf, 500)
sol = solution.sol(t)

x = sol[0]
y = sol[1]

plt.figure(figsize=(10,8))

plt.subplot(2,1,1)
plt.plot(t,x,linewidth=2)
plt.xlabel("Time (s)")
plt.ylabel("x (m)")
plt.grid()

plt.subplot(2,1,2)
plt.plot(t,y,linewidth=2)
plt.xlabel("Time (s)")
plt.ylabel("y (m)")
plt.grid()

plt.tight_layout()

plt.savefig("plot.png")
plt.savefig("plot.pdf")

plt.show()
`

function updateLines(){
let n=code.value.split("\n").length
let s=""
for(let i=1;i<=n;i++) s+=i+"\n"
lines.textContent=s
}
updateLines()

code.addEventListener("input",updateLines)
code.addEventListener("scroll",()=>lines.scrollTop=code.scrollTop)

let pyodideReady=loadPyodide()

async function run(){

output.textContent="Running..."

let pyodide=await pyodideReady

await pyodide.loadPackage("numpy")
await pyodide.loadPackage("matplotlib")
await pyodide.loadPackage("scipy")

await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use("Agg")
`)

let stdout=""
pyodide.setStdout({batched:(s)=>stdout+=s})

await pyodide.runPythonAsync(code.value)

let png=pyodide.FS.readFile("plot.png",{encoding:"binary"})
let blob=new Blob([png],{type:"image/png"})
let url=URL.createObjectURL(blob)

plotDiv.innerHTML="<img src='"+url+"' width='700'>"

output.textContent = stdout || "Execution complete."

}

function savePNG(){
let link=document.createElement("a")
link.href=document.querySelector("#plot img").src
link.download="plot.png"
link.click()
}

function savePDF(){
alert("PDF saved internally by Python as plot.pdf")
}

</script>

</body>
</html>
