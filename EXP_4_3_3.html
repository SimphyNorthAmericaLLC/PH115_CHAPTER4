
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parallel Wires B‑Field Both Sides</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}
canvas{
    background:white;
    margin-top:20px;
    border:1px solid #ccc;
}
button{
    margin:10px;
    padding:8px 14px;
    font-size:14px;
}
</style>
</head>

<body>

<h2>Magnetic Field Around Parallel Wires</h2>
<button onclick="toggleWire1()">Toggle Current Wire 1</button>
<button onclick="toggleWire2()">Toggle Current Wire 2</button>

<canvas id="canvas" width="900" height="450"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let wire1 = {x:300, current:1};
let wire2 = {x:600, current:1};

function drawWire(x){
    ctx.strokeStyle="black";
    ctx.lineWidth=7;
    ctx.beginPath();
    ctx.moveTo(x,80);
    ctx.lineTo(x,360);
    ctx.stroke();
}

function drawArrow(x1,y1,x2,y2,color){
    ctx.strokeStyle=color;
    ctx.fillStyle=color;
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();

    let angle=Math.atan2(y2-y1,x2-x1);
    let h=10;

    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-h*Math.cos(angle-Math.PI/6),y2-h*Math.sin(angle-Math.PI/6));
    ctx.lineTo(x2-h*Math.cos(angle+Math.PI/6),y2-h*Math.sin(angle+Math.PI/6));
    ctx.closePath();
    ctx.fill();
}

function drawCurrentArrow(x,dir){
    let y1 = dir>0 ? 330 : 120;
    let y2 = dir>0 ? 120 : 330;
    drawArrow(x,y1,x,y2,"red");
}

function drawSymbol(x,y,into){
    ctx.strokeStyle="purple";
    ctx.fillStyle="purple";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.arc(x,y,14,0,2*Math.PI);
    ctx.stroke();

    if(into){
        ctx.beginPath();
        ctx.moveTo(x-6,y-6);
        ctx.lineTo(x+6,y+6);
        ctx.moveTo(x-6,y+6);
        ctx.lineTo(x+6,y-6);
        ctx.stroke();
    }else{
        ctx.beginPath();
        ctx.arc(x,y,4,0,2*Math.PI);
        ctx.fill();
    }
}

function drawFieldAroundWire(wire){

    const ys=[120,180,240,300];

    for(let y of ys){

        // LEFT side
        let intoLeft = wire.current>0 ? false : true;
        drawSymbol(wire.x-70,y,intoLeft);

        // RIGHT side
        let intoRight = wire.current>0 ? true : false;
        drawSymbol(wire.x+70,y,intoRight);
    }
}

function drawForce(){

    let attract = wire1.current===wire2.current;

    let y=220;

    if(attract){
        drawArrow(wire1.x,y,wire1.x+60,y,"blue");
        drawArrow(wire2.x,y,wire2.x-60,y,"blue");
    }else{
        drawArrow(wire1.x,y,wire1.x-60,y,"blue");
        drawArrow(wire2.x,y,wire2.x+60,y,"blue");
    }

    ctx.fillStyle = attract ? "green":"red";
    ctx.font="20px Arial";
    ctx.fillText(attract?"Attraction":"Repulsion",410,40);
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawWire(wire1.x);
    drawWire(wire2.x);

    drawCurrentArrow(wire1.x,wire1.current);
    drawCurrentArrow(wire2.x,wire2.current);

    drawFieldAroundWire(wire1);
    drawFieldAroundWire(wire2);

    drawForce();
}

function toggleWire1(){
    wire1.current*=-1;
    draw();
}

function toggleWire2(){
    wire2.current*=-1;
    draw();
}

draw();

</script>

</body>
</html>
