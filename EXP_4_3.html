
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magnetic Field Around a Wire</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:6px;
}

button{
padding:6px 12px;
margin-top:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
<b>Current Direction</b><br>
<button onclick="toggleCurrent()">Toggle Current</button>
<p id="currentLabel">Current: Up</p>
</div>

<script>

let scene = new THREE.Scene()
scene.background = new THREE.Color(0xffffff)

let camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000)
camera.position.set(4,4,4)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let controls = new THREE.OrbitControls(camera,renderer.domElement)

// wire
let wireGeo = new THREE.CylinderGeometry(0.05,0.05,6,32)
let wireMat = new THREE.MeshBasicMaterial({color:0x000000})
let wire = new THREE.Mesh(wireGeo,wireMat)
scene.add(wire)

// current arrow
let currentDir = new THREE.Vector3(0,1,0)
let currentArrow = new THREE.ArrowHelper(currentDir,new THREE.Vector3(0,-3,0),6,0xff0000)
scene.add(currentArrow)

// magnetic field arrows
let arrows=[]
let radius = 1.5

function createField(){

for(let i=0;i<12;i++){

let angle = i*2*Math.PI/12
let x = radius*Math.cos(angle)
let z = radius*Math.sin(angle)

let dir

if(currentDir.y>0){
dir = new THREE.Vector3(Math.sin(angle),0,-Math.cos(angle))
}else{
dir = new THREE.Vector3(-Math.sin(angle),0,Math.cos(angle))
}

let arrow = new THREE.ArrowHelper(dir,new THREE.Vector3(x,0,z),0.8,0x0000ff)
scene.add(arrow)
arrows.push(arrow)

}

}

createField()

function toggleCurrent(){

currentDir.y *= -1

scene.remove(currentArrow)
currentArrow = new THREE.ArrowHelper(currentDir,new THREE.Vector3(0,-3,0),6,0xff0000)
scene.add(currentArrow)

document.getElementById("currentLabel").innerText =
currentDir.y>0 ? "Current: Up" : "Current: Down"

// update B field
arrows.forEach(a=>scene.remove(a))
arrows=[]
createField()

}

// animation
function animate(){

requestAnimationFrame(animate)
controls.update()
renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
