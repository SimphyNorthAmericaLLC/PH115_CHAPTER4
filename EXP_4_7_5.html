<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXP_4_7_5_WIDGET</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{background:#1e1e1e;color:white;font-family:monospace;padding:15px;}
.editor{display:flex;border:1px solid #444;height:340px;}
#lineNumbers{background:#111;color:#00ff00;padding:10px 8px;margin:0;text-align:right;overflow:hidden;white-space:pre;user-select:none;}
#code{flex:1;background:#111;color:white;border:none;padding:10px;resize:none;overflow:auto;white-space:pre;}
button{margin-top:10px;margin-right:10px;padding:8px 14px;background:#007acc;color:white;border:none;cursor:pointer;}
#output{background:#000;color:#0f0;padding:10px;margin-top:10px;white-space:pre-wrap;border:1px solid #333;}
#plotBox{margin-top:15px;background:white;padding:10px;display:none;}
#plotBox img{max-width:100%;margin-bottom:10px;}
</style>
</head>
<body>

<h3>Back EMF vs Motor Speed</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off"># Define constants
V_source = 12.0  # voltage from the power source in volts
R = 5.0  # resistance of the coil in ohms
k = 0.1  # constant relating back EMF to angular speed (V per rad/s)

# Define angular speeds for low and high-speed scenarios
low_omega = 10.0  # low angular speed in rad/s
high_omega = 100.0  # high angular speed in rad/s

# Calculate back EMF for low and high angular speeds
back_emf_low = k * low_omega
back_emf_high = k * high_omega

# Calculate current drawn at low and high angular speeds
current_low_speed = (V_source - back_emf_low) / R
current_high_speed = (V_source - back_emf_high) / R

# Print results
print(f"At low angular speed ({low_omega} rad/s):")
print(f"Back EMF = {back_emf_low:.2f} V")
print(f"Current drawn = {current_low_speed:.2f} A")
print(f"At high angular speed ({high_omega} rad/s):")
print(f"Back EMF = {back_emf_high:.2f} V")
print(f"Current drawn = {current_high_speed:.2f} A")
</textarea>
</div>

<button onclick="run()">Run Code</button>

<div id="output"></div>

<div id="plotBox">
<img id="plot1">
</div>

<script>
const codeEl=document.getElementById("code");
const lineNumbers=document.getElementById("lineNumbers");
const plotBox=document.getElementById("plotBox");
const output=document.getElementById("output");

function updateLineNumbers(){
    const lines=codeEl.value.split("\n").length;
    let nums="";
    for(let i=1;i<=lines;i++) nums+=i+"\n";
    lineNumbers.textContent=nums;
}

codeEl.addEventListener("input", updateLineNumbers);
codeEl.addEventListener("scroll", ()=> lineNumbers.scrollTop = codeEl.scrollTop);
updateLineNumbers();

let pyodideReady = loadPyodide();

async function run(){
    plotBox.style.display="none";
    output.textContent="Running...";
    let pyodide = await pyodideReady;
    await pyodide.loadPackage(["numpy","matplotlib"]);
    await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
plt.close('all')
from io import BytesIO
import base64

import sys, io
sys.stdout = io.StringIO()
`);
    await pyodide.runPythonAsync(codeEl.value);

    let stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()");
    output.textContent = stdout || "Execution complete."; 

    const figCount = await pyodide.runPythonAsync("len(plt.get_fignums())");
    if (figCount > 0) {
        let img = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.savefig(buf,format="png")
buf.seek(0)
base64.b64encode(buf.read()).decode()
`);
        document.getElementById("plot1").src="data:image/png;base64,"+img;
        plotBox.style.display="block";
    }

}


</script>
</body>
</html>
