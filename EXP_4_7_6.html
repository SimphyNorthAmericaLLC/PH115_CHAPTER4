
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXP_4_7_6_WIDGET</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body{background:#1e1e1e;color:white;font-family:monospace;padding:20px;}
.editor{display:flex;border:1px solid #444;}
#lineNumbers{background:#111;color:#00ff00;padding:10px;text-align:right;white-space:pre;user-select:none;}
#code{flex:1;background:#111;color:white;border:none;padding:10px;resize:none;overflow:auto;white-space:pre;}
button{margin-top:10px;margin-right:10px;padding:8px 14px;background:#007acc;color:white;border:none;cursor:pointer;}
#plotBox{margin-top:15px;background:white;padding:10px;display:none;}
#plotBox img{max-width:100%;}
</style>
</head>

<body>

<h3>Quarter Shrinker Simulation</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code"></textarea>
</div>

<button onclick="run()">Run Code</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>

<div id="plotBox">
<img id="plot">
</div>

<script>

const code=document.getElementById("code")
const lines=document.getElementById("lineNumbers")
const plot=document.getElementById("plot")
const plotBox=document.getElementById("plotBox")

code.value=`import numpy as np
import matplotlib.pyplot as plt

# Quarter Shrinker Simulation (Simplified)
# Parameters for magnetic pulse
I0 = 1000  # Initial current in amperes
tau = 0.01  # Time constant for exponential decay in seconds
t = np.linspace(0, 0.05, 1000)  # Time array

# Current as a function of time (exponentially decaying pulse)
I_t = I0 * np.exp(-t / tau)

# Magnetic field (proportional to current, assuming a simple proportionality constant)
mu_0 = 4 * np.pi * 1e-7  # Permeability of free space (H/m)
N = 10  # Number of turns in the coil
R = 0.05  # Radius of the coil in meters
B_t = mu_0 * N * I_t / (2 * R)  # Simplified magnetic field at the center of the coil

# Force on the quarter (assuming a loop with induced current)
# F = I_induced * L x B, where L is the length of the induced current loop
# Here, we simplify by calculating a force proportional to the rate of change of B
A_quarter = np.pi * (0.012)**2  # Area of the quarter (radius = 1.2 cm)
dB_dt = -I0 / tau * np.exp(-t / tau)  # Time derivative of magnetic field

# Induced emf (Faraday's Law: emf = -dPhi/dt)
emf = A_quarter * dB_dt

# Induced current (assuming resistance R_quarter)
R_quarter = 1e-3  # Resistance of the quarter in ohms
I_induced = emf / R_quarter

# Lorentz force (simplified, proportional to induced current and magnetic field)
F_quarter = I_induced * B_t

# Plotting the force on the quarter over time
plt.figure(figsize=(10, 6))
plt.plot(t, F_quarter, label='Force on Quarter', color='b')
plt.xlabel('Time (s)')
plt.ylabel('Force (N)')
plt.title('Force Acting on the Quarter Over Time')
plt.grid()
plt.legend()
plt.tight_layout()
`

// line numbers
function updateLines(){
let count=code.value.split("\n").length
let nums=""
for(let i=1;i<=count;i++) nums+=i+"\n"
lines.textContent=nums
}

code.addEventListener("input",updateLines)
updateLines()

let pyodideReady=loadPyodide()

async function run(){
const pyodide=await pyodideReady
await pyodide.loadPackage(["numpy","matplotlib"])

let userCode=code.value

pyodide.runPython(`
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
import io,base64
`)

try{

pyodide.runPython(userCode)

pyodide.runPython(`
buf=io.BytesIO()
plt.savefig(buf,format="png")
buf.seek(0)
img=base64.b64encode(buf.read()).decode()
`)

let img=pyodide.globals.get("img")
plot.src="data:image/png;base64,"+img
plotBox.style.display="block"

}catch(err){
alert(err)
}
}

function savePNG(){
let link=document.createElement("a")
link.href=plot.src
link.download="plot.png"
link.click()
}

function savePDF(){
let link=document.createElement("a")
link.href=plot.src
link.download="plot.pdf"
link.click()
}

</script>

</body>
</html>
